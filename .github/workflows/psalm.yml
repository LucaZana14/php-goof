name: "SAST - Psalm (Taint Analysis)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  psalm:
    name: Psalm Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, mysqli, gd
          tools: composer:v2

      - name: Update Dependencies and Install Psalm
        run: |
          # Eliminiamo il lock per non avere conflitti tra 2021 e 2026
          rm -f composer.lock
          # Update -W (With all dependencies) risolve i problemi di PHPMailer e CommonMark
          composer update -W --ignore-platform-reqs --no-interaction
          # Aggiungiamo Psalm
          composer require --dev vimeo/psalm --ignore-platform-reqs --no-interaction

      - name: Esegui Psalm con Taint Analysis
        run: |
          if [ ! -f psalm.xml ]; then
            ./vendor/bin/psalm --init . 1
          fi
          # Creiamo il report SARIF per la tab Security di GitHub
          ./vendor/bin/psalm --taint-analysis --report=results.sarif --no-cache || true

      - name: Carica i risultati su GitHub Security
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: results.sarif