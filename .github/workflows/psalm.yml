name: "SAST - Psalm (Taint Analysis)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  psalm:
    name: Psalm Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4' # Aggiornato al 2026 per evitare ParseErrors
          extensions: mbstring, intl, mysqli
          tools: composer:v2

      - name: Installa dipendenze e Psalm
        run: |
          # Installiamo tutto insieme ignorando i requisiti della piattaforma per php-goof
          composer require --dev vimeo/psalm --ignore-platform-reqs --no-interaction
          composer install --ignore-platform-reqs --no-interaction

      - name: Esegui Psalm con Taint Analysis
        run: |
          # Genera il config solo se non esiste
          if [ ! -f psalm.xml ]; then
            ./vendor/bin/psalm --init . 1
          fi
          
          # Eseguiamo l'analisi. Usiamo --no-cache per essere sicuri della pulizia
          ./vendor/bin/psalm --taint-analysis --report=results.sarif --no-cache || true

      - name: Carica i risultati su GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif