name: "AI Security - Snyk AI-BOM"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snyk-ai-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install AI Dependencies
        run: |
          python -m pip install --upgrade pip
          # Usiamo --user per evitare problemi di permessi e forziamo l'installazione
          pip install -r requirements.txt --user
          # Verifichiamo cosa è stato installato (utile per i log)
          pip list

      - name: Install Snyk CLI
        run: |
          curl https://static.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x ./snyk
          mv snyk /usr/local/bin/

      - name: Snyk Auth
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk SBOM Generate
        run: |
          # 1. Creiamo il file preventivamente per evitare l'errore di upload-artifact
          echo "{}" > ai-bom-results.json
          
          # 2. Lanciamo Snyk. Aggiungiamo --command=python3 per forzare la risoluzione
          # Usiamo '2>&1' per catturare eventuali errori dentro il file se vogliamo debuggare
          snyk sbom --format=cyclonedx1.4+json --all-projects --command=python3 > ai-bom-results.json || echo "Snyk ha trovato problemi, ma il file è stato scritto."

      - name: Check file content (Debug)
        run: |
          ls -lh ai-bom-results.json
          head -n 20 ai-bom-results.json

      - name: Upload AI-BOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-ai-bom-report
          path: ai-bom-results.json