name: "AI Security - Snyk AI-BOM"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Restiamo nel futuro!

permissions:
  contents: read

jobs:
  snyk-ai-scan:
    name: Snyk AI Infrastructure Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. SETUP PYTHON (Necessario per risolvere i requirements.txt)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2. INSTALLA DIPENDENZE IA (Così Snyk le "vede" nel sistema)
      - name: Install AI Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Snyk CLI
        run: |
          curl https://static.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x ./snyk
          mv snyk /usr/local/bin/

      - name: Snyk Auth
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # 3. AI-BOM TEST
      - name: Snyk AI-BOM Test
        run: |
          # Usiamo --command=python3 per aiutare Snyk a orientarsi
          snyk ai-bom test --all-projects || echo "Rischi IA rilevati."

      # 4. GENERAZIONE SBOM
      - name: Snyk SBOM Generate
        run: |
          snyk sbom --format=cyclonedx1.4+json --all-projects --output=ai-bom-results.json || echo "SBOM generata con vulnerabilità."
          
      - name: Upload AI-BOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-ai-bom-report
          path: ai-bom-results.json
          if-no-files-found: error