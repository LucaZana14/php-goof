name: "AI Security - Snyk Free Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# --- IL FIX DI CHECKOV PARTE DA QUI ---
permissions:
  contents: read # Permette solo di leggere il codice sorgente
# --------------------------------------

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - name: Install Snyk CLI
        run: |
          curl https://static.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x ./snyk
          mv snyk /usr/local/bin/

      - name: Snyk Auth
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Open Source Test (Requirements)
        run: |
          snyk test --file=requirements.txt --package-manager=pip || echo "Vulnerabilità trovate nelle librerie IA."

      - name: Snyk Code Test (AI Logic)
        run: |
          snyk code test ai_service.py || echo "Falle logiche trovate nel codice IA."