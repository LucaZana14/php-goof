name: "AI Security - Snyk Free Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Snyk CLI
        run: |
          curl https://static.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x ./snyk
          mv snyk /usr/local/bin/

      - name: Snyk Auth
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # 1. SCAN DELLE LIBRERIE IA (SCA)
      # Questo troverà i 22 errori di cui parlavamo prima
      - name: Snyk Open Source Test (Requirements)
        run: |
          snyk test --file=requirements.txt --package-manager=pip || echo "Vulnerabilità trovate nelle librerie IA."

      # 2. SCAN DEL CODICE IA (SAST)
      # Qui Snyk userà il suo motore AI per trovare errori nel tuo file Python
      - name: Snyk Code Test (AI Logic)
        run: |
          snyk code test ai_service.py || echo "Falle logiche trovate nel codice IA."