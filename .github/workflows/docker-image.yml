name: "Build and Security Scan Image"

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write # Necessario per caricare i risultati nella tab Security

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build dell'immagine locale (senza caricarla ancora)
      - name: Build Docker image
        run: docker build -t php-goof:${{ github.sha }} .

      # 2. Scansione dell'immagine appena creata
      - name: Run Trivy vulnerability scanner (Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'php-goof:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # 3. Scansione del File System (per le dipendenze PHP/Composer)
      - name: Run Trivy vulnerability scanner (Repo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # 4. Caricamento dei risultati su GitHub
      - name: Upload Trivy scans to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          # Carichiamo entrambi i report (Trivy permette di farlo unendo i file o caricandoli separatamente)
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

      # 5. Esempio di Push (solo se vuoi caricarlo da qualche parte)
      # - name: Push image (optional)
      #   run: |
      #     # Qui andrebbe la logica di login e push se i test passano