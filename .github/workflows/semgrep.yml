name: "SAST - Semgrep"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      # Usiamo il nuovo nome ufficiale dell'immagine (returntocorp ora è solo semgrep)
      image: semgrep/semgrep
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Esegui Semgrep Offline
        # Usiamo 'scan' invece di 'ci' per forzare la modalità totalmente offline.
        # Passiamo esplicitamente le regole di sicurezza senza usare 'auto'.
        run: semgrep scan --sarif --config p/php --config p/security-audit --config p/secrets > semgrep.sarif || true

      - name: Carica i risultati su GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif