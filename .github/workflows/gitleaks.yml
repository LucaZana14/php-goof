name: Secret Scanning (GitLeaks)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  gitleaks:
    name: GitLeaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 è fondamentale. Dice a GitHub di scaricare 
          # TUTTA la storia dei commit, non solo l'ultimo. 
          # I segreti nascosti nel passato sono pericolosi quanto quelli di oggi.
          fetch-depth: 0 

      - name: Esegui GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}