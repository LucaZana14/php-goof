name: Secret Scanning - GitLeaks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  security-events: write # Obbligatorio per scrivere nella tab Security

jobs:
  gitleaks:
    name: GitLeaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout del codice
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Esegui GitLeaks (Genera SARIF)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Questa riga è la chiave: genera il file che GitHub può leggere
          args: --report-format sarif --report-path results.sarif
          fail-action: false # Evitiamo che il job si blocchi, così carica comunque il report

      - name: Carica i risultati su GitHub Security
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        if: always() # Carica i risultati anche se GitLeaks ha trovato segreti
        with:
          sarif_file: results.sarif