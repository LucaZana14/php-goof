name: "SUT - PHPUnit & Mutation Testing"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# FIX 1 (CHECKOV): Dichiariamo esplicitamente i permessi di sola lettura
permissions:
  contents: read

jobs:
  test-and-mutate:
    name: Security Tests & Mutation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP con PCOV
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: pcov 
          tools: composer:v2

      - name: Installa Dipendenze e Tool di Test
        run: |
          rm -f composer.lock
          composer update -W --ignore-platform-reqs --no-interaction
          
          # FIX 2 (COMPOSER): Autorizziamo esplicitamente il plugin di Infection prima di installarlo
          composer config --no-plugins allow-plugins.infection/extension-installer true
          
          # Ora possiamo installare i tool in tranquillità
          composer require --dev phpunit/phpunit "^10.0" infection/infection "^0.27" -W --ignore-platform-reqs

      - name: 1. Esegui Security Unit Tests (PHPUnit)
        run: |
          ./vendor/bin/phpunit --coverage-xml=coverage/xml --log-junit=coverage/junit.xml tests/ || true

      - name: 2. Esegui Mutation Testing (Infection)
        run: |
          ./vendor/bin/infection --coverage=coverage --min-msi=50 --min-covered-msi=50 --threads=2 --logger-github