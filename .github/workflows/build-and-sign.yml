name: "Supply Chain - Build, Push and Sign"

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-push-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout del codice
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # 1. PREPARAZIONE: Creiamo l'output minuscolo
      # Usiamo GITHUB_OUTPUT invece di GITHUB_ENV per una compatibilità totale
      - name: Prepare Image Name
        id: prep
        run: |
          echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. BUILD & PUSH: Usiamo l'output dello step 'prep'
      - name: Build and Push
        id: build-and-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest

      # 3. FIRMA: Usiamo di nuovo l'output dello step 'prep'
      - name: Sign the image
        # La variabile viene iniettata correttamente prima dell'esecuzione dello script
        run: |
          cosign sign --yes ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest