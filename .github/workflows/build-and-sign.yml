name: "Supply Chain - Build, Push and Sign"

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write   # Necessario per pushare su GHCR
  id-token: write   # FONDAMENTALE: permette a Cosign di usare l'identità di GitHub (Keyless signing)

jobs:
  build-push-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Installiamo Cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # 2. Login al registro di GitHub (GHCR)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build e Push dell'immagine
      - name: Build and Push
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      # 4. Firma dell'immagine (Keyless!)
      - name: Sign the image
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}:latest