name: "SAST - SonarCloud"

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fondamentale: Sonar ha bisogno della cronologia Git per capire chi ha introdotto i bug

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Generato automaticamente da GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # Quello che hai messo nei Secrets