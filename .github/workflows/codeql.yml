name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 15 * * 3' # Gira ogni mercoledì alle 15:00

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    
    permissions:
      actions: read
      contents: read
      security-events: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Inizializzazione del motore CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          # Usiamo le query estese per una protezione maggiore
          queries: security-extended

      # Autobuild tenta di configurare l'ambiente per l'analisi
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Esecuzione dell'analisi vera e propria
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3