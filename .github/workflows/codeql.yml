name: "CodeQL Advanced PHP"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Esegue una scansione automatica ogni giovedì alle 05:28 
    # per trovare nuove vulnerabilità scoperte nel tempo
    - cron: '28 5 * * 4'

jobs:
  analyze:
    name: Analyze PHP
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Inizializza i motori di CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4 
        with:
          languages: php
          # 'none' perché PHP non deve essere compilato
          tools: latest
          build-mode: none
          # Carica query aggiuntive per trovare falle di sicurezza più profonde
          queries: security-extended,security-and-quality

      # Esegue l'analisi vera e propria
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4 
        with:
          category: "/language:php"