name: "SCA & SAST - Snyk Scanner"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Prepariamo l'ambiente PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'
          tools: composer:v2

      # Prepariamo l'ambiente Python (FONDAMENTALE per requirements.txt)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Installiamo Snyk CLI via NPM per avere la versione più flessibile
      - name: Install Snyk CLI
        run: npm install -g snyk

      # Eseguiamo il test. 
      # Usiamo "|| true" per permettere al SARIF di venire caricato anche se ci sono bug.
      - name: Snyk Test
        run: |
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk test --all-projects --sarif-file-output=snyk-results.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Carica i risultati su GitHub Security
        uses: github/codeql-action/upload-sarif@v4.35.2 # Aggiornato a v4
        if: always()
        with:
          sarif_file: snyk-results.sarif