name: "SCA & SAST - Snyk Scanner"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Livello globale: solo lettura
permissions:
  contents: read

jobs:
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    
    # Permessi specifici per questo Job (Soddisfa Scorecard)
    permissions:
      contents: read
      security-events: write
      id-token: write # Necessario per Harden Runner

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.32.0
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Setup Python
        uses: actions/setup-python@v5.3.0   # v5.3.0
        with:
          python-version: '3.10'

      - name: Install Snyk CLI
        # Pinniamo la versione specifica di Snyk per Scorecard
        run: npm install -g snyk@1.1295.0

      - name: Snyk Test
        id: snyk_test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # 1. Creiamo il file sarif vuoto IMMEDIATAMENTE
          # Questo evita l'errore "Path does not exist" se Snyk fallisce l'auth
          touch snyk-results.sarif
          
          # 2. Eseguiamo Snyk. La CLI usa automaticamente il token dall'ambiente.
          # Usiamo '|| true' per non far fallire lo step e permettere l'upload del SARIF
          snyk test --all-projects --sarif-file-output=snyk-results.sarif || echo "Scan terminato"

      - name: Carica i risultati su GitHub Security
        # Hash ufficiale per v3 (Node 24 compatibile)
        uses: github/codeql-action/upload-sarif@v3.28.10 # v3.28.10
        if: always() # Esegue l'upload anche se Snyk ha trovato vulnerabilità
        with:
          sarif_file: snyk-results.sarif