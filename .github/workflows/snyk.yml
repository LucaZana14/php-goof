name: "SCA & SAST - Snyk Scanner"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read


jobs:
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write


    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Prepariamo l'ambiente PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'
          tools: composer:v2

      # Prepariamo l'ambiente Python (FONDAMENTALE per requirements.txt)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Installiamo Snyk CLI via NPM per avere la versione più flessibile
      - name: Install Snyk CLI
        run: npm install -g snyk

      # Eseguiamo il test.
      - name: Snyk Test
        run: |
          # 1. Creiamo un file vuoto come "assicurazione" per evitare l'errore 'Path does not exist'
          touch snyk-results.sarif
          
          # 2. Non usiamo 'snyk auth'. La CLI riconosce automaticamente SNYK_TOKEN dall'env.
          # Aggiungiamo --skip-unresolved per evitare che Snyk si blocchi se non trova i binari Python
          snyk test --all-projects --sarif-file-output=snyk-results.sarif --skip-unresolved || echo "Scan completato con rilevamenti"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Carica i risultati su GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: snyk-results.sarif